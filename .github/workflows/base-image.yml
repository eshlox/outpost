name: Base image

# The base image and bootstrap fetch pinned GitHub release tarballs and vendor
# installers over HTTPS. Those URLs rot silently (asset renames, yanked releases), and
# nothing else in CI actually builds the image — so a broken pin would first surface as
# a user hitting a 404 on day one. This builds shared/Dockerfile for both arches on a
# weekly schedule and whenever the base inputs change, turning that into a failed run.

on:
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - 'shared/Dockerfile'
      - 'shared/bootstrap-user.sh'
      - 'shared/sshd.sh'
      - 'shared/home/**'
      - '.github/workflows/base-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build base image (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: shared
          platforms: ${{ matrix.platform }}
          push: false
          tags: outpost-base:ci

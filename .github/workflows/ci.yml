name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; only the release job elevates what it needs.
permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck -S warning bin/outpost install.sh shared/bootstrap-user.sh shared/sshd.sh tests/smoke.sh tests/mock-docker
      - name: smoke tests (mock engine, no Docker)
        run: bash tests/smoke.sh

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: docs/.node-version   # same file Cloudflare Pages builds with
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - run: pnpm -C docs install --frozen-lockfile
      - run: pnpm -C docs run build

  # Runs LAST: gated on shell + docs, and only on a push to main (never on PRs).
  # Opens/updates the "Version Packages" PR from pending changesets; merging that PR
  # bumps the version, writes CHANGELOG.md + VERSION/bin/outpost, and tags the release.
  release:
    needs: [shell, docs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          version: pnpm run version:packages
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck -S warning bin/outpost install.sh shared/bootstrap-user.sh shared/sshd.sh tests/smoke.sh tests/mock-docker
      - name: smoke tests (mock engine, no Docker)
        run: bash tests/smoke.sh

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - run: pnpm -C docs install --frozen-lockfile
      - run: pnpm -C docs run build

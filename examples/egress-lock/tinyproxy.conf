# tinyproxy config for the egress-proxy sidecar (approach B in the README).
# Mounted read-only at /etc/tinyproxy/tinyproxy.conf. The ALLOWLIST of domains
# lives in `allowlist.filter` (tinyproxy can't inline domain rules in this file);
# both are mounted by compose.yaml.
#
# What this enforces: the box points HTTPS_PROXY/HTTP_PROXY at this proxy, so every
# outbound HTTP(S) request is a CONNECT/GET that names its host in cleartext. tinyproxy
# matches that host against the allowlist and refuses anything not on it. This is
# DOMAIN-level control (the robust part), not IP-level. It does NOT stop a process
# that ignores the proxy env and opens a raw socket - see the README's honesty note.

User tinyproxy
Group tinyproxy

# Listen on all interfaces INSIDE the container; only the project network can reach it
# (it is never published to a host port). The box connects to it as egress-proxy:8888.
Port 8888
Listen 0.0.0.0
Timeout 600

# Which CLIENTS may use the proxy. The proxy only sits on outpost-<project>-net, so the
# only clients are that project's containers; these ranges just keep it from being an
# open relay if the network is ever shared. Tighten to your network's subnet if you like.
Allow 127.0.0.1
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16

# Domain allowlist. FilterDefaultDeny flips the filter file from a blocklist into an
# ALLOWLIST: only hosts matching a line in allowlist.filter are permitted, everything
# else is denied. FilterExtended = POSIX extended regex. Matching is on the HOSTNAME
# (works for HTTPS too: the CONNECT request names the host in cleartext).
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny On
FilterExtended On
FilterCaseSensitive Off
FilterURLs Off

# Only allow CONNECT (HTTPS tunnels) to standard TLS ports, so the proxy can't be used
# to tunnel to arbitrary services. 443 = HTTPS. Remove 563 if you don't need it.
ConnectPort 443
ConnectPort 563

# Keep the proxy from advertising itself in a Via header.
DisableViaHeader On

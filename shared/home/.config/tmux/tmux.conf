# =============================================================================
# tmux for the box. Smallest config that's still pleasant: behaviour tweaks +
# a hand-rolled Catppuccin Latte status bar (no plugins), matching Helix/bat.
#
# box launches one tmux session per project via `box sh` (session named after the
# project, shown on the left of the status bar). The `just` wrapper in .bashrc
# renames the current window to the recipe while it runs, then hands the name back
# to tmux's automatic-rename.
# =============================================================================

# --- behaviour ---------------------------------------------------------------
set -g default-shell /bin/bash      # box exec's in without PAM, so $SHELL may be unset
set -g mouse on                     # click to select, scroll, resize
set -g base-index 1                 # windows count from 1
setw -g pane-base-index 1
set -g renumber-windows on          # keep window numbers gapless after a close
set -g history-limit 50000
set -sg escape-time 10              # don't swallow ESC (matters for Helix)
set -g focus-events on
setw -g automatic-rename on         # name idle windows after their foreground process

# vi keys: copy-mode navigation/selection + vi-style command prompt editing
setw -g mode-keys vi
set -g status-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Option/Alt + 1..0 jumps straight to a window (0 -> window 10) without the prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# truecolor: tmux inherits COLORTERM=truecolor from the image; advertise RGB to the
# outer terminal so Claude/Codex orange survives instead of quantizing to red.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# --- catppuccin latte --------------------------------------------------------
# base #eff1f5  mantle #e6e9ef  surface0 #ccd0da
# text #4c4f69  subtext0 #6c6f85  blue #1e66f5  mauve #8839ef
set -g status-style "bg=#e6e9ef,fg=#4c4f69"
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 20

# left: project (session) name in a blue pill
set -g status-left "#[bg=#1e66f5,fg=#eff1f5,bold] #S #[default] "
# right: clock, low-key
set -g status-right "#[fg=#6c6f85]%H:%M "

# window tabs: inactive dim, active mauve on surface0
setw -g window-status-format "#[fg=#6c6f85] #I #W "
setw -g window-status-current-format "#[bg=#ccd0da,fg=#8839ef,bold] #I #W "

# borders + messages
set -g pane-border-style "fg=#ccd0da"
set -g pane-active-border-style "fg=#1e66f5"
set -g message-style "bg=#ccd0da,fg=#4c4f69"
set -g mode-style "bg=#ccd0da,fg=#4c4f69"
